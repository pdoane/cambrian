<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Cambrian - Evolution Simulation</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <h1>CAMBRIAN</h1>
      <span class="subtitle">Evolution Simulation</span>
    </header>

    <!-- Main simulation canvas -->
    <div class="canvas-container">
      <canvas id="world-canvas"></canvas>
    </div>

    <!-- Legend -->
    <div class="legend-column">
      <canvas id="legend-canvas"></canvas>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- Controls (always visible) -->
      <div class="controls">
        <h2>Controls</h2>
        <div class="control-row">
          <button id="btn-play-pause">Play</button>
        </div>
        <div class="speed-control">
          <label id="speed-label">Speed: 1x</label>
          <input type="range" id="slider-speed" min="1" max="10" value="4">
        </div>
      </div>

      <!-- Dynamic panel built by ui.js -->
      <div id="sidebar-panel" class="sidebar-panel"></div>
    </div>

    <!-- Bottom panel: charts -->
    <div class="bottom-panel">
      <div class="chart-item">
        <canvas id="chart-population" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-speed" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-size" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-eyesight" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-efficiency" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-hue" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-charisma" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-reproductiveCapability" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-pregnancyTime" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-attack" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-defense" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-maxEnergy" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-maxHealth" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-moveCostBase" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-idleCost" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-hungerThreshold" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-thirstThreshold" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-matingDuration" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-eatingDuration" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-maturityAge" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-mutRate" width="200" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-mutStep" width="200" height="80"></canvas>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
