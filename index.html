<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambrian - Evolution Simulation</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header>
      <h1>CAMBRIAN</h1>
      <span class="subtitle">Evolution Simulation</span>
    </header>

    <!-- Main simulation canvas -->
    <div class="canvas-container">
      <canvas id="world-canvas"></canvas>
    </div>

    <!-- Sidebar: controls + tabbed settings -->
    <div class="sidebar">
      <!-- Controls (always visible) -->
      <div class="controls">
        <h2>Controls</h2>
        <div class="control-row">
          <button id="btn-play-pause">Play</button>
          <button id="btn-restart">Restart</button>
        </div>
        <div class="speed-control">
          <label id="speed-label">Speed: 1x</label>
          <input type="range" id="slider-speed" min="1" max="10" value="1">
        </div>
      </div>

      <!-- Tabbed settings area -->
      <div class="tab-bar">
        <button class="tab active" data-tab="tab-settings">Settings</button>
        <button class="tab" data-tab="tab-dna">DNA</button>
      </div>
      <div class="tab-content">
        <div id="tab-settings" class="tab-pane active"></div>
        <div id="tab-dna" class="tab-pane"></div>
      </div>
    </div>

    <!-- Bottom panel: charts -->
    <div class="bottom-panel">
      <div class="chart-item">
        <canvas id="chart-population" width="300" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-speed" width="300" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-size" width="300" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-senseRange" width="300" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-efficiency" width="300" height="80"></canvas>
      </div>
      <div class="chart-item">
        <canvas id="chart-hue" width="300" height="80"></canvas>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
